<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Signage - Full Screen Media</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body, html { 
            margin: 0; padding: 0; 
            width: 100vw; height: 100vh; 
            background: #000; overflow: hidden; 
            font-family: 'Chakra Petch', sans-serif; 
        }
        
        #fullscreen-container { 
            width: 100vw; height: 100vh; 
            position: relative; 
            overflow: hidden; 
        }
        
        /* บังคับยืดเต็มจอ 100% ด้วย object-fit: fill และมีเอฟเฟกต์ Fade in/out */
        .media-item { 
            width: 100%; height: 100%; 
            object-fit: fill; 
            position: absolute; 
            top: 0; left: 0;
            opacity: 0; 
            visibility: hidden;
            transition: opacity 1s ease-in-out, visibility 1s; 
        }
        
        .active { 
            opacity: 1 !important; 
            visibility: visible !important; 
            z-index: 1;
        }
    </style>
</head>
<body>

    <div id="fullscreen-container">
        <!-- สื่อจะถูกเพิ่มอัตโนมัติที่นี่ -->
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBvXRATBf2x1Lq_JToL2rlQYOh8mK65tIU",
            authDomain: "suchartstudio-9a78d.firebaseapp.com",
            databaseURL: "https://suchartstudio-9a78d-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "suchartstudio-9a78d",
            storageBucket: "suchartstudio-9a78d.firebasestorage.app",
            messagingSenderId: "953369646185",
            appId: "1:953369646185:web:1d028fac51e3da1e6ebef8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let mediaList = [];
        let currentIndex = 0;
        let playTimeout;
        const container = document.getElementById('fullscreen-container');

        function playMedia() {
            if (mediaList.length === 0) return;
            
            // ดึงคลาส active ออกจากทั้งหมด เพื่อให้ค่อยๆ จางหาย (Fade out)
            document.querySelectorAll('.media-item').forEach(el => el.classList.remove('active'));
            
            if (currentIndex >= mediaList.length) currentIndex = 0;
            const currentMedia = mediaList[currentIndex];
            const mediaElement = document.getElementById(`media-${currentIndex}`);
            
            if (mediaElement) {
                // ใส่คลาส active เพื่อให้ค่อยๆ ปรากฏ (Fade in)
                mediaElement.classList.add('active');
                
                if (currentMedia.type === 'video') {
                    mediaElement.currentTime = 0;
                    // เล่นเสียงวิดีโอ (หากตั้งค่าเบราว์เซอร์ให้ Autoplay แล้ว)
                    mediaElement.play().catch(e => console.log("Video Play Error (Autoplay Blocked):", e));
                    mediaElement.onended = () => { clearTimeout(playTimeout); currentIndex++; playMedia(); };
                } else {
                    playTimeout = setTimeout(() => { currentIndex++; playMedia(); }, (currentMedia.duration || 10) * 1000);
                }
            } else {
                currentIndex++; playMedia();
            }
        }

        function buildMediaElements(list) {
            container.innerHTML = "";
            list.forEach((item, index) => {
                let el = document.createElement(item.type === 'video' ? 'video' : 'img');
                el.src = item.url;
                el.className = 'media-item';
                el.id = `media-${index}`;
                
                // เปิดเสียงให้วิดีโอ
                if (item.type === 'video') { 
                    el.muted = false; 
                }
                
                container.appendChild(el);
            });
        }

        onSnapshot(doc(db, "signage", "main_screen"), (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                const newMediaList = data.mediaList || [];
                
                // ตรวจสอบการเปลี่ยนแปลงและโหลดสื่อใหม่
                if(JSON.stringify(newMediaList) !== JSON.stringify(mediaList)) {
                    mediaList = newMediaList;
                    buildMediaElements(mediaList);
                    clearTimeout(playTimeout);
                    currentIndex = 0;
                    playMedia();
                }
            }
        });
    </script>
</body>
</html>
