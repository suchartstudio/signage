<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Signage - Fade Transition with Audio</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; background: #000; overflow: hidden; font-family: 'Chakra Petch', sans-serif; }
        
        /* หน้าต่างขออนุญาตเล่นเสียง (บังคับโดย Browser) */
        #start-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(11, 15, 25, 0.95); color: #00FFCC; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; cursor: pointer; text-transform: uppercase; border: 4px solid #00FFCC; box-sizing: border-box; }
        .pulse-text { font-size: 40px; font-weight: bold; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; transform: scale(0.98); } 100% { opacity: 1; } }

        #display-wrapper { display: flex; width: 100%; height: calc(100vh - 80px); }
        
        #poster-container { width: 40%; height: 100%; background: #000; position: relative; overflow: hidden; border-right: 2px solid #2A3441;}
        #main-container { width: 60%; height: 100%; background: #000; position: relative; overflow: hidden; }
        
        .poster-item, .main-item { 
            width: 100%; height: 100%; 
            object-fit: fill; 
            position: absolute; 
            top: 0; left: 0;
            opacity: 0; 
            visibility: hidden;
            transition: opacity 1s ease-in-out, visibility 1s; 
        }
        
        .active { 
            opacity: 1 !important; 
            visibility: visible !important; 
            z-index: 1;
        }

        #marquee-container { height: 80px; width: 100%; display: flex; align-items: center; border-top: 2px solid; white-space: nowrap; overflow: hidden; box-sizing: border-box; transition: 0.3s all; }
        .marquee-text { display: inline-block; padding-left: 100vw; font-weight: 700; animation: marquee linear infinite; }
        
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>

    <!-- Overlay แตะเพื่อเริ่มระบบเสียง -->
    <div id="start-overlay">
        <div class="pulse-text">TAP TO START SIGNAGE</div>
        <div style="font-size: 20px; margin-top: 15px; color: #E2E8F0;">แตะหน้าจอ 1 ครั้งเพื่อเริ่มระบบและเปิดการทำงานของเสียง</div>
    </div>

    <div id="display-wrapper">
        <div id="poster-container"></div>
        <div id="main-container"></div>
    </div>

    <div id="marquee-container">
        <div class="marquee-text" id="marquee-display">กำลังเชื่อมต่อข้อมูล...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBvXRATBf2x1Lq_JToL2rlQYOh8mK65tIU",
            authDomain: "suchartstudio-9a78d.firebaseapp.com",
            databaseURL: "https://suchartstudio-9a78d-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "suchartstudio-9a78d",
            storageBucket: "suchartstudio-9a78d.firebasestorage.app",
            messagingSenderId: "953369646185",
            appId: "1:953369646185:web:1d028fac51e3da1e6ebef8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let posterList = [];
        let posterIndex = 0;
        let posterTimeout;
        const posterContainer = document.getElementById('poster-container');

        let mainList = [];
        let mainIndex = 0;
        let mainTimeout;
        const mainContainer = document.getElementById('main-container');

        const marqueeContainer = document.getElementById('marquee-container');
        const marqueeDisplay = document.getElementById('marquee-display');

        // ตัวแปรเช็คว่ากดเริ่มหรือยัง
        let isStarted = false;

        document.getElementById('start-overlay').addEventListener('click', function() {
            this.style.display = 'none';
            isStarted = true;
            
            // เมื่อกดเริ่ม ให้ดึงคิวสื่อมาเล่นทันที
            if (posterList.length > 0) playPoster();
            if (mainList.length > 0) playMain();
        });

        function playPoster() {
            if (!isStarted || posterList.length === 0) return;
            document.querySelectorAll('.poster-item').forEach(el => el.classList.remove('active'));
            
            if (posterIndex >= posterList.length) posterIndex = 0;
            const currentMedia = posterList[posterIndex];
            const mediaElement = document.getElementById(`poster-${posterIndex}`);
            
            if (mediaElement) {
                mediaElement.classList.add('active');
                if (currentMedia.type === 'video') {
                    mediaElement.currentTime = 0;
                    mediaElement.play().catch(e => console.log("Poster Video Error:", e));
                    mediaElement.onended = () => { clearTimeout(posterTimeout); posterIndex++; playPoster(); };
                } else {
                    posterTimeout = setTimeout(() => { posterIndex++; playPoster(); }, (currentMedia.duration || 10) * 1000);
                }
            } else {
                posterIndex++; playPoster();
            }
        }

        function playMain() {
            if (!isStarted || mainList.length === 0) return;
            document.querySelectorAll('.main-item').forEach(el => el.classList.remove('active'));
            
            if (mainIndex >= mainList.length) mainIndex = 0;
            const currentMedia = mainList[mainIndex];
            const mediaElement = document.getElementById(`main-${mainIndex}`);
            
            if (mediaElement) {
                mediaElement.classList.add('active');
                if (currentMedia.type === 'video') {
                    mediaElement.currentTime = 0;
                    // จอหลักเล่นเสียงได้ หากโดนบล็อกจะแสดง error ใน console
                    mediaElement.play().catch(e => console.log("Main Video Audio Blocked:", e));
                    mediaElement.onended = () => { clearTimeout(mainTimeout); mainIndex++; playMain(); };
                } else {
                    mainTimeout = setTimeout(() => { mainIndex++; playMain(); }, (currentMedia.duration || 10) * 1000);
                }
            } else {
                mainIndex++; playMain();
            }
        }

        // เพิ่ม Parameter "isMuted" เพื่อบังคับปิด/เปิดเสียง
        function buildMediaElements(list, container, prefix, className, isMuted) {
            container.innerHTML = "";
            list.forEach((item, index) => {
                let el = document.createElement(item.type === 'video' ? 'video' : 'img');
                el.src = item.url;
                el.className = className;
                el.id = `${prefix}-${index}`;
                if (item.type === 'video') { 
                    el.muted = isMuted; // บังคับตามค่าที่ส่งเข้ามา
                }
                container.appendChild(el);
            });
        }

        onSnapshot(doc(db, "signage", "main_screen"), (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                
                marqueeDisplay.innerText = data.marqueeText || "";
                marqueeContainer.style.backgroundColor = data.marqueeBgColor || "#0B0F19";
                marqueeContainer.style.color = data.marqueeColor || "#00FFCC";
                marqueeContainer.style.borderTopColor = data.marqueeColor || "#00FFCC";
                marqueeDisplay.style.fontSize = (data.marqueeFontSize || 46) + "px";
                marqueeDisplay.style.animationDuration = (data.marqueeSpeed || 20) + "s";
                
                const newPosterList = data.posterList || [];
                if(JSON.stringify(newPosterList) !== JSON.stringify(posterList)) {
                    posterList = newPosterList;
                    // บังคับ Poster = true (ปิดเสียงเสมอ)
                    buildMediaElements(posterList, posterContainer, 'poster', 'poster-item', true);
                    clearTimeout(posterTimeout);
                    posterIndex = 0;
                    playPoster();
                }

                const newMainList = data.mediaList || [];
                if(JSON.stringify(newMainList) !== JSON.stringify(mainList)) {
                    mainList = newMainList;
                    // บังคับ Main = false (ให้เล่นเสียง)
                    buildMediaElements(mainList, mainContainer, 'main', 'main-item', false);
                    clearTimeout(mainTimeout);
                    mainIndex = 0;
                    playMain();
                }
            }
        });
    </script>
</body>
</html>
