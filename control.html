<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signage Control Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0B0F19; --surface: #151B2B; --primary: #00FFCC; --danger: #FF3366; --text: #E2E8F0; }
        body { margin: 0; font-family: 'Chakra Petch', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        #login-overlay { position: fixed; top:0; left:0; width: 100%; height: 100%; background: var(--bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        .container { max-width: 900px; margin: 0 auto; display: none; }
        h1 { color: var(--primary); text-transform: uppercase; letter-spacing: 2px; text-align: center; border-bottom: 2px solid #2A3441; padding-bottom: 20px; }
        h2 { color: var(--primary); font-size: 24px; margin-top: 0; }
        .card { background: var(--surface); padding: 25px; border-radius: 12px; border-left: 5px solid var(--primary); margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        input, select, button { font-family: 'Chakra Petch', sans-serif; font-size: 18px; padding: 15px; margin: 5px 0; border-radius: 8px; border: 1px solid #2A3441; background: #0B0F19; color: white; width: 100%; box-sizing: border-box; }
        input[type="file"] { border: none; padding: 10px 0; }
        
        button { cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.2s; border: none; }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-primary:hover { background: #00E6B8; transform: translateY(-2px); }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-small { padding: 12px; font-size: 16px; width: auto; flex: 1; }
        .flex-row { display: flex; gap: 15px; align-items: center; flex-wrap: wrap; margin-bottom: 15px;}
        .col { flex: 1; min-width: 150px; }
        .media-row { display: flex; align-items: center; justify-content: space-between; background: var(--bg); padding: 15px; border-radius: 8px; margin-bottom: 12px; border: 1px solid #2A3441; flex-wrap: wrap; gap: 15px;}
        .media-info { display: flex; align-items: center; gap: 15px; flex: 2; min-width: 200px; }
        .thumbnail { width: 90px; height: 90px; object-fit: cover; border-radius: 6px; border: 1px solid var(--primary); background: #000; }
        .controls { display: flex; gap: 10px; flex: 1; min-width: 250px;}
        .status-text { color: var(--primary); font-weight: bold; margin-top: 10px; }
        .limit-warn { color: var(--danger); font-size: 14px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <h1 style="border: none;">SECURE ACCESS</h1>
        <input type="password" id="password" placeholder="Enter PIN" style="text-align:center; font-size: 24px; max-width: 300px;">
        <button class="btn-primary" onclick="checkPassword()" style="max-width: 300px; margin-top: 15px;">LOGIN</button>
    </div>

    <div class="container" id="dashboard">
        <h1>Control Panel</h1>
        
        <div class="card">
            <h2>Full Screen Media (วิดีโอ/ภาพเต็มจอ)</h2>
            <div class="limit-warn" id="media-count">รายการ: 0/10</div>
            
            <div class="flex-row">
                <div class="col" style="flex: 2;">
                    <input type="file" id="media-file" accept="image/*,video/*">
                </div>
                <div class="col">
                    <input type="number" id="media-duration" placeholder="เวลา (วินาที)" value="10">
                </div>
                <div class="col">
                    <button class="btn-primary" onclick="uploadMedia()" style="height: 55px;">UPLOAD</button>
                </div>
            </div>
            
            <div id="upload-status" class="status-text"></div>
            <div id="playlist-container" style="margin-top: 20px;"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBvXRATBf2x1Lq_JToL2rlQYOh8mK65tIU",
            authDomain: "suchartstudio-9a78d.firebaseapp.com",
            databaseURL: "https://suchartstudio-9a78d-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "suchartstudio-9a78d",
            storageBucket: "suchartstudio-9a78d.firebasestorage.app",
            messagingSenderId: "953369646185",
            appId: "1:953369646185:web:1d028fac51e3da1e6ebef8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);
        const docRef = doc(db, "signage", "main_screen");

        let mediaList = [];

        window.checkPassword = () => {
            if (document.getElementById('password').value === '987654321') {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                initDashboard();
            } else {
                alert('Access Denied');
            }
        };

        function initDashboard() {
            onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    mediaList = data.mediaList || [];
                    
                    document.getElementById('media-count').innerText = `รายการ: ${mediaList.length}/10`;
                    renderPlaylist();
                }
            });
        }

        // ระบบบีบอัดภาพก่อนอัปโหลด
        function compressImage(file, maxWidth = 1920, maxHeight = 1080, quality = 0.8) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = event => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > maxWidth) {
                                height = Math.round((height *= maxWidth / width));
                                width = maxWidth;
                            }
                        } else {
                            if (height > maxHeight) {
                                width = Math.round((width *= maxHeight / height));
                                height = maxHeight;
                            }
                        }

                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        canvas.toBlob((blob) => resolve(blob), 'image/jpeg', quality);
                    };
                };
            });
        }

        window.uploadMedia = async () => {
            if (mediaList.length >= 10) {
                return alert('อัปโหลดได้สูงสุด 10 ไฟล์ต่อจอภาพ เพื่อป้องกันพื้นที่จัดเก็บเต็ม');
            }

            const fileInput = document.getElementById('media-file');
            const durationInput = document.getElementById('media-duration');
            const statusDisplay = document.getElementById('upload-status');
            
            const file = fileInput.files[0];
            const duration = durationInput.value;
            
            if (!file) return alert('กรุณาเลือกไฟล์');

            if (file.size > 50 * 1024 * 1024) {
                fileInput.value = '';
                return alert('ปฏิเสธการทำงาน: ขนาดไฟล์เกิน 50 MB กรุณาลดขนาดไฟล์ก่อนทำการอัปโหลด');
            }

            statusDisplay.innerText = 'กำลังประมวลผลไฟล์...';
            
            let fileToUpload = file;
            const fileType = file.type.startsWith('video/') ? 'video' : 'image';
            
            if (fileType === 'image') {
                fileToUpload = await compressImage(file);
            }

            const fileExtension = fileType === 'image' ? 'jpg' : file.name.split('.').pop();
            const storagePath = `signage_fullscreen/${Date.now()}_optimized.${fileExtension}`;
            const storageRef = ref(storage, storagePath);
            const uploadTask = uploadBytesResumable(storageRef, fileToUpload);

            uploadTask.on('state_changed', 
                (snapshot) => {
                    const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                    statusDisplay.innerText = `Uploading: ${Math.round(progress)}%`;
                }, 
                (error) => { console.error(error); statusDisplay.innerText = 'Upload failed!'; }, 
                async () => {
                    const downloadURL = await getDownloadURL(uploadTask.snapshot.ref);
                    const newMedia = { type: fileType, url: downloadURL, duration: parseInt(duration) || 10, storagePath: storagePath };
                    
                    let newList = [...mediaList, newMedia];
                    await setDoc(docRef, { mediaList: newList }, { merge: true });
                    
                    statusDisplay.innerText = 'อัปโหลดสำเร็จ!';
                    setTimeout(() => statusDisplay.innerText = '', 3000);
                    fileInput.value = '';
                }
            );
        };

        function renderPlaylist() {
            const container = document.getElementById('playlist-container');
            container.innerHTML = '';
            
            mediaList.forEach((item, index) => {
                const row = document.createElement('div');
                row.className = 'media-row';
                const typeLabel = item.type === 'video' ? '🎬 วิดีโอ' : `🖼️ ภาพ (${item.duration}s)`;
                
                row.innerHTML = `
                    <div class="media-info">
                        ${item.type === 'video' ? `<video src="${item.url}" class="thumbnail"></video>` : `<img src="${item.url}" class="thumbnail">`}
                        <span style="font-size: 18px;">${typeLabel}</span>
                    </div>
                    <div class="controls">
                        <button class="btn-primary btn-small" onclick="moveItem(${index}, -1)">▲</button>
                        <button class="btn-primary btn-small" onclick="moveItem(${index}, 1)">▼</button>
                        <button class="btn-danger btn-small" onclick="deleteItem(${index})">X ลบ</button>
                    </div>
                `;
                container.appendChild(row);
            });
        }

        window.moveItem = async (index, direction) => {
            if (index + direction < 0 || index + direction >= mediaList.length) return;
            const newIndex = index + direction;
            
            const temp = mediaList[index];
            mediaList[index] = mediaList[newIndex];
            mediaList[newIndex] = temp;
            
            await setDoc(docRef, { mediaList: mediaList }, { merge: true });
        };

        window.deleteItem = async (index) => {
            if(confirm('ต้องการลบสื่อนี้ และลบไฟล์ออกจากพื้นที่จัดเก็บใช่หรือไม่?')) {
                const itemToDelete = mediaList[index];

                if (itemToDelete.storagePath) {
                    try {
                        const fileRef = ref(storage, itemToDelete.storagePath);
                        await deleteObject(fileRef);
                    } catch (error) {
                        console.error('ไม่สามารถลบไฟล์จาก Storage ได้:', error);
                    }
                }

                mediaList.splice(index, 1);
                await setDoc(docRef, { mediaList: mediaList }, { merge: true });
            }
        };
    </script>
</body>
</html>
